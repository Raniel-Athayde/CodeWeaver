<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Framework de Compilação Web</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 2rem; background: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 100px; margin-bottom: 1rem; padding: 0.5rem; font-family: monospace; }
        button { background: #007bff; color: white; border: none; padding: 0.5rem 1rem; cursor: pointer; border-radius: 4px; }
        button:hover { background: #0056b3; }
        pre { background: #2d2d2d; color: #f8f8f2; padding: 1rem; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>

<div class="container">
    <h2>Interpretador na Nuvem</h2>
    <p>Insira uma expressão matemática básica (ex: <code>10 + 5 * 2</code>)</p>
    
    <textarea id="sourceCode" placeholder="Escreva seu código aqui..."></textarea>
    <button onclick="enviarCodigo()">Compilar e Executar</button>
    
    <h3>Saída do Pipeline:</h3>
    <pre id="output">Aguardando código...</pre>
</div>

<script>
    async function enviarCodigo() {
        const codigo = document.getElementById('sourceCode').value;
        const outputElement = document.getElementById('output');
        
        outputElement.innerText = "Processando via microsserviços...";
        
        try {
            // Chama a rota do nosso framework
            const response = await fetch('/api/compile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: codigo })
            });
            
            const data = await response.json();
            outputElement.innerText = JSON.stringify(data, null, 2);
            
        } catch (error) {
            outputElement.innerText = "Erro ao conectar com o backend: " + error.message;
        }
    }
</script>

</body>
</html>
